<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="rounded-mask">
      <rect width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>
  </defs>

  <!-- macOS 圆角矩形白底板 -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="white"/>

  <!-- 底板内阴影/描边，增加层次 -->
  <rect x="2" y="2" width="1020" height="1020" rx="228" ry="228" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="4"/>

  <!-- Logo 图形，居中 -->
  <g clip-path="url(#rounded-mask)">
    <g transform="translate(512,512)">
      <g transform="translate(-180,-200)">
        <!-- 底层页面 -->
        <rect x="0" y="40" width="280" height="360" rx="28" ry="28" fill="#1a1a1a"/>
        <!-- 上层页面 -->
        <rect x="80" y="0" width="280" height="360" rx="28" ry="28" fill="white" stroke="#1a1a1a" stroke-width="24"/>
        <!-- 文字横线 -->
        <rect x="124" y="80" width="192" height="18" rx="9" fill="#1a1a1a"/>
        <rect x="124" y="130" width="156" height="18" rx="9" fill="#1a1a1a"/>
        <rect x="124" y="180" width="192" height="18" rx="9" fill="#1a1a1a"/>
        <rect x="124" y="230" width="120" height="18" rx="9" fill="#1a1a1a"/>
      </g>
    </g>
  </g>
</svg>